name: PR APK

# Runs automatically only for PRs authored by the repo owner. For
# contributor PRs, the owner triggers it manually from the Actions tab
# with the PR number after reviewing the changes.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to build an APK for"
        required: true
        type: number

concurrency:
  group: pr-apk-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

env:
  PUB_SUMMARY_ONLY: true
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}

permissions:
  contents: read
  pull-requests: write

jobs:
  build-apk:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      # Submodules are deliberately not fetched here: actions/checkout clones
      # them with --depth=1, leaving the Flutter submodule without tags and
      # reporting version 0.0.0-unknown. The manual submodule update below
      # clones it in full instead. Credentials are not persisted because
      # manual runs build unreviewed fork code, which must not find a token
      # in the git config.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pr) || '' }}
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter from submodule
        run: |
          git submodule update --init --recursive flutter
          chmod +x flutter/bin/*
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
          flutter/bin/flutter --version
          flutter/bin/flutter config --no-analytics

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build -d

      - name: Tune Gradle for CI runner memory
        run: |
          sed -i \
            -e 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=512m -XX:ActiveProcessorCount=2/' \
            -e 's/^org.gradle.workers.max=.*/org.gradle.workers.max=2/' \
            android/gradle.properties

      # Fork PRs cannot access the real keystore secrets, so sign with the
      # committed, deliberately public pr-testing-public.jks. Every PR build
      # shares its signature, so testers can update Flexify PR in place, and
      # the .pr application id keeps it from conflicting with the real app.
      - name: Configure PR testing signing key
        run: |
          cat > android/key.properties <<EOF
          storePassword=pr-testing-public
          keyPassword=pr-testing-public
          keyAlias=pr
          storeFile=pr-testing-public.jks
          EOF

      - name: Build APK
        env:
          FLEXIFY_APP_ID_SUFFIX: .pr
          FLEXIFY_APP_LABEL: Flexify PR
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk \
            "flexify-pr-${PR_NUMBER}.apk"

      - name: Upload APK artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: flexify-pr-${{ env.PR_NUMBER }}
          path: flexify-pr-*.apk
          retention-days: 14

      - name: Add job summary
        run: |
          {
            echo "### 📱 PR APK built"
            echo ""
            echo "[Download the APK](${{ steps.upload.outputs.artifact-url }}) (zipped, expires in 14 days)."
            echo ""
            echo "Installs side by side with regular Flexify as **Flexify PR** (\`com.presley.flexify.pr\`) — your real install and its data are untouched. All PR builds share a signing key, so installing one replaces any previous *Flexify PR* build in place."
          } >> "$GITHUB_STEP_SUMMARY"

      # The GITHUB_TOKEN on fork PRs is read-only, so commenting only works
      # for same-repo PRs and owner-triggered manual runs; fork contributors
      # get the job summary instead.
      - name: Comment download link on PR
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- pr-apk-comment -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const body = [
              marker,
              '### 📱 PR APK built',
              '',
              `[Download the APK](${process.env.ARTIFACT_URL}) (zipped, expires in 14 days) to test this change.`,
              '',
              `Built from ${pr.head.sha}. Installs side by side with regular Flexify as **Flexify PR** (\`com.presley.flexify.pr\`) — your real install and its data are untouched. All PR builds share a signing key, so installing one replaces any previous *Flexify PR* build in place.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
